<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>screen_reader coordinate picker</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #111;
        color: #f2f2f2;
      }
      body {
        margin: 0;
      }
      header {
        position: sticky;
        top: 0;
        z-index: 10;
        display: grid;
        grid-template-columns: auto auto 1fr;
        gap: 12px;
        align-items: center;
        padding: 10px 12px;
        background: #1d1d1d;
        border-bottom: 1px solid #333;
      }
      button,
      input {
        font: inherit;
      }
      button {
        border: 1px solid #555;
        border-radius: 6px;
        background: #2b2b2b;
        color: #fff;
        padding: 6px 10px;
        cursor: pointer;
      }
      button.active {
        border-color: #ffd15c;
        color: #ffd15c;
      }
      .readout {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 13px;
      }
      main {
        padding: 12px;
      }
      canvas {
        display: block;
        image-rendering: auto;
        background: #000;
        cursor: crosshair;
      }
      textarea {
        width: min(900px, calc(100vw - 24px));
        min-height: 92px;
        margin-top: 12px;
        box-sizing: border-box;
        border: 1px solid #444;
        border-radius: 6px;
        background: #171717;
        color: #f2f2f2;
        padding: 10px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }
      .hint {
        color: #aaa;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <header>
      <input id="file" type="file" accept="image/*" />
      <div>
        <button id="point" class="active" type="button">point/color</button>
        <button id="rect" type="button">rect</button>
      </div>
      <div class="readout">
        <span id="pos">x: -, y: -</span>
        <span id="rgb">rgb: [-, -, -]</span>
        <span id="rectText">rect: -</span>
      </div>
    </header>
    <main>
      <canvas id="canvas"></canvas>
      <textarea id="yaml" readonly placeholder="ここに config.yml 用の値が出ます"></textarea>
      <p class="hint">
        point/color: マウス位置の座標と色を表示。rect: 左上で押して右下で離すと x/y/w/h を出します。
      </p>
    </main>

    <script>
      const fileInput = document.getElementById("file");
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d", { willReadFrequently: true });
      const pos = document.getElementById("pos");
      const rgb = document.getElementById("rgb");
      const rectText = document.getElementById("rectText");
      const yaml = document.getElementById("yaml");
      const pointButton = document.getElementById("point");
      const rectButton = document.getElementById("rect");

      let image = null;
      let mode = "point";
      let dragStart = null;
      let currentRect = null;

      pointButton.addEventListener("click", () => setMode("point"));
      rectButton.addEventListener("click", () => setMode("rect"));

      fileInput.addEventListener("change", () => {
        const file = fileInput.files && fileInput.files[0];
        if (!file) return;
        const url = URL.createObjectURL(file);
        const img = new Image();
        img.onload = () => {
          URL.revokeObjectURL(url);
          image = img;
          canvas.width = img.naturalWidth;
          canvas.height = img.naturalHeight;
          draw();
          yaml.value = "";
        };
        img.src = url;
      });

      canvas.addEventListener("mousemove", (event) => {
        if (!image) return;
        const point = canvasPoint(event);
        showPoint(point);
        if (mode === "rect" && dragStart) {
          currentRect = makeRect(dragStart, point);
          draw();
        }
      });

      canvas.addEventListener("mousedown", (event) => {
        if (!image || mode !== "rect") return;
        dragStart = canvasPoint(event);
        currentRect = { x: dragStart.x, y: dragStart.y, w: 1, h: 1 };
        draw();
      });

      canvas.addEventListener("mouseup", (event) => {
        if (!image || mode !== "rect" || !dragStart) return;
        currentRect = makeRect(dragStart, canvasPoint(event));
        dragStart = null;
        writeRect(currentRect);
        draw();
      });

      canvas.addEventListener("click", (event) => {
        if (!image || mode !== "point") return;
        const point = canvasPoint(event);
        const color = pixel(point);
        yaml.value = `x: ${point.x}\ny: ${point.y}\nw: 8\nh: 8\nactive_rgb: [${color.r}, ${color.g}, ${color.b}]\ntolerance: 45\nmin_ratio: 0.35`;
      });

      function setMode(nextMode) {
        mode = nextMode;
        pointButton.classList.toggle("active", mode === "point");
        rectButton.classList.toggle("active", mode === "rect");
      }

      function canvasPoint(event) {
        const box = canvas.getBoundingClientRect();
        const scaleX = canvas.width / box.width;
        const scaleY = canvas.height / box.height;
        return {
          x: Math.max(0, Math.min(canvas.width - 1, Math.floor((event.clientX - box.left) * scaleX))),
          y: Math.max(0, Math.min(canvas.height - 1, Math.floor((event.clientY - box.top) * scaleY))),
        };
      }

      function pixel(point) {
        const data = ctx.getImageData(point.x, point.y, 1, 1).data;
        return { r: data[0], g: data[1], b: data[2] };
      }

      function showPoint(point) {
        const color = pixel(point);
        pos.textContent = `x: ${point.x}, y: ${point.y}`;
        rgb.textContent = `rgb: [${color.r}, ${color.g}, ${color.b}]`;
      }

      function makeRect(a, b) {
        const x = Math.min(a.x, b.x);
        const y = Math.min(a.y, b.y);
        return {
          x,
          y,
          w: Math.abs(a.x - b.x) + 1,
          h: Math.abs(a.y - b.y) + 1,
        };
      }

      function writeRect(rect) {
        rectText.textContent = `rect: x=${rect.x}, y=${rect.y}, w=${rect.w}, h=${rect.h}`;
        yaml.value = `{ x: ${rect.x}, y: ${rect.y}, w: ${rect.w}, h: ${rect.h} }`;
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (image) ctx.drawImage(image, 0, 0);
        if (!currentRect) return;
        ctx.save();
        ctx.strokeStyle = "#ffd15c";
        ctx.lineWidth = 2;
        ctx.setLineDash([6, 4]);
        ctx.strokeRect(currentRect.x + 0.5, currentRect.y + 0.5, currentRect.w, currentRect.h);
        ctx.restore();
      }
    </script>
  </body>
</html>
